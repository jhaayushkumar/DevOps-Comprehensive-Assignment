version: "3.8"
services:
  app:
  build: .
  ports:
    - "80:5000"
  environment:
    -MONGO-URI = mongodb://db:27017||class
    -port = 5000
  depends_on:
    -db
  restart: always

  image: mongo-7
  ports:
    -"27017:27017"
  volumes:
    -mongo-data:data/db

  restart: always

volumes:
  mongo-data:
